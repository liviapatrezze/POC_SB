{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}POCSB{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'poc/style.css' %}?v=9">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{% url 'poc:index' %}" class="header-left">
        <img src="{% static 'poc/logo-sb.png' %}" alt="SportBridge" class="header-logo">
      </a>
      <nav class="header-nav">
        {% url 'poc:index' as url_index %}
        {% url 'poc:cadastro' as url_cadastro %}
        <a href="{{ url_index }}" class="btn {% if request.path == url_index %}btn-active{% else %}btn-outline{% endif %}">Relatório</a>
        <a href="{{ url_cadastro }}" class="btn {% if request.path == url_cadastro %}btn-active{% else %}btn-outline{% endif %}">Cadastro</a>
      </nav>
    </div>
  </header>
  <main class="site-main">
    {% if messages %}
    <ul class="global-msgs" role="status">
      {% for message in messages %}
      <li class="global-msg global-msg--{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">POCSB</div>
  </footer>
</body>
</html>
